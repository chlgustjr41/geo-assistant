services:
  geo-assistant-backend:
    build: ./backend
    container_name: geo-assistant-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    volumes:
      - geo-assistant-data:/app/data/users
      - ./backend/data/rule_sets:/app/data/rule_sets:ro
      - ./backend/data/seed_queries:/app/data/seed_queries:ro
      - ./backend/service-account.json:/app/service-account.json:ro
    environment:
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/service-account.json

volumes:
  geo-assistant-data:
